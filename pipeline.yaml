apiVersion: tekton.dev/v1
kind: Pipeline

metadata:
  name: payment-ci-pipeline

spec:

  workspaces:
  - name: shared-workspace

  tasks:

  - name: clone-repository
    taskRef:
      name: git-clone

    workspaces:
    - name: output
      workspace: shared-workspace

  - name: build-image
    runAfter:
    - clone-repository

    taskRef:
      name: build-image

    workspaces:
    - name: source
      workspace: shared-workspace

  - name: push-image
    runAfter:
    - build-image

    taskRef:
      name: push-artifactory

    workspaces:
    - name: source
      workspace: shared-workspace
